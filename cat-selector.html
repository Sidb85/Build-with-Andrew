<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Which Cat Should You Have? — Dramatic Reveal</title>
<style>
  :root{
    --bg:#0f1724;
    --card:#0b1220;
    --accent:#ffcc00;
    --muted:#94a3b8;
    --glass: rgba(255,255,255,0.04);
    --radius:14px;
    --text:#e6eef8;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
    background:
      radial-gradient(1200px 600px at 10% 10%, #07203a 0%, transparent 15%),
      radial-gradient(900px 400px at 90% 90%, #112a2b 0%, transparent 12%),
      var(--bg);
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px;
  }

  .app{
    width:100%;
    max-width:840px;
    border-radius:16px;
    padding:22px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border:1px solid rgba(255,255,255,0.04);
    position:relative;
    overflow:hidden;
    box-shadow:0 18px 50px rgba(2,6,23,0.6);
  }

  header{display:flex;gap:14px;align-items:center;margin-bottom:14px}
  .logo{width:58px;height:58px;border-radius:12px;background:linear-gradient(135deg,#142238,#0b1a2a);display:flex;align-items:center;justify-content:center;font-size:26px}
  h1{margin:0;font-size:20px}
  .lead{margin:0;color:var(--muted);font-size:13px}

  .card{
    background:var(--card);
    border-radius:12px;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
    min-height:220px;
  }

  .top-row{display:flex;align-items:center;gap:12px}
  .question{font-weight:700;font-size:18px}
  .hint{color:var(--muted);font-size:13px}
  .progress{margin-left:auto;display:flex;gap:8px}
  .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.06)}
  .dot.active{background:var(--accent);box-shadow:0 0 8px rgba(255,204,0,0.18)}

  .options{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
  .option{
    background:var(--glass);
    border:1px solid rgba(255,255,255,0.03);
    padding:12px 14px;border-radius:10px;cursor:pointer;
    min-width:190px;flex:1;display:flex;gap:12px;align-items:center;
    transition:transform .16s ease,box-shadow .16s ease;
    color:var(--text);
    text-align:left;
  }
  .option:focus{outline:2px solid rgba(255,204,0,0.18)}
  .option:hover{transform:translateY(-6px);box-shadow:0 10px 30px rgba(2,6,23,0.6)}
  .emoji{font-size:28px}
  .title{font-weight:700}
  .desc{font-size:13px;color:var(--muted)}

  .actions{display:flex;gap:10px;align-items:center;margin-top:auto}
  .btn{
    padding:10px 14px;border-radius:10px;border:0;cursor:pointer;font-weight:700;background:linear-gradient(180deg,#16243a,#0f2b45);color:var(--text)
  }
  .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted)}
  .btn.secondary{background:linear-gradient(180deg,#2a3c4e,#1b2c3b)}

  footer{display:flex;justify-content:space-between;margin-top:12px;color:var(--muted);font-size:13px}

  /* reveal overlay (hidden until active) */
  .reveal-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:60}
  .reveal-overlay.active{display:flex}
  .curtain{position:absolute;inset:0;display:flex;z-index:62}
  .curtain .panel{width:50%;height:100%;background:linear-gradient(180deg,#081525,#071622);transition:transform .9s cubic-bezier(.2,.8,.2,1)}
  .curtain .panel.left{box-shadow:inset -40px 0 80px rgba(0,0,0,0.5)}
  .curtain .panel.right{box-shadow:inset 40px 0 80px rgba(0,0,0,0.5)}
  .curtain.open .left{transform:translateX(-120%)} .curtain.open .right{transform:translateX(120%)}

  .spotlight{position:relative;z-index:64;display:flex;flex-direction:column;align-items:center;gap:12px;opacity:0;transform:scale(.94);transition:opacity .5s ease .2s,transform .5s ease .2s}
  .spotlight.on{opacity:1;transform:scale(1)}
  .beam{position:absolute;width:520px;height:420px;border-radius:50%;background:radial-gradient(closest-side, rgba(255,255,220,0.12), rgba(255,255,220,0.02));filter:blur(30px);z-index:63;opacity:0;transition:opacity .5s}
  .beam.on{opacity:1}

  .reveal-card{width:520px;max-width:94%;background:linear-gradient(180deg,#061226,#07172a);border-radius:12px;padding:22px;text-align:center;border:1px solid rgba(255,255,255,0.04)}
  .reveal-emoji{font-size:64px;display:block;transform:translateY(-6px) scale(.85);transition:transform .5s}
  .reveal-emoji.show{transform:translateY(0) scale(1)}
  .reveal-title{font-size:24px;margin:8px 0 6px;font-weight:800;opacity:0;transform:translateY(8px);transition:opacity .32s ease .6s,transform .32s .6s}
  .reveal-title.show{opacity:1;transform:translateY(0)}
  .reveal-desc{color:var(--muted);font-size:14px;opacity:0;transition:opacity .32s ease .8s}
  .reveal-desc.show{opacity:1}
  .result-meta{display:flex;gap:10px;justify-content:center;margin-top:12px}
  .pill{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,0.03);font-size:13px;color:var(--muted)}

  .confetti{position:absolute;inset:0;pointer-events:none;z-index:65;overflow:hidden}

  @media (max-width:640px){
    .option{min-width:140px}
    .reveal-card{width:92%}
    .beam{width:360px;height:260px}
  }
</style>
</head>
<body>
  <div class="app" id="app" aria-live="polite">
    <header>
      <div class="logo">🐾</div>
      <div>
        <h1>Which Cat Should You Have?</h1>
        <p class="lead">Answer up to three quick questions. You can stop early — the reveal will be dramatic.</p>
      </div>
    </header>

    <main class="card" id="card" role="region" aria-label="Cat selector quiz">
      <div class="top-row">
        <div>
          <div class="question" id="qTitle">Ready?</div>
          <div class="hint" id="qHint">There are 3 questions. Choose one option per question.</div>
        </div>
        <div class="progress" id="progress" aria-hidden="true"></div>
      </div>

      <div class="options" id="options" role="list">
        <!-- options injected here -->
      </div>

      <div class="actions">
        <button class="btn ghost" id="revealEarly">Reveal Early</button>
        <div style="flex:1"></div>
        <button class="btn secondary" id="restart" style="display:none">Start Over</button>
      </div>
    </main>

    <footer><div id="credit">Made with dramatic flair</div><div style="color:var(--muted)"><strong>Bengaluru, IN</strong></div></footer>

    <!-- Dramatic reveal overlay -->
    <div class="reveal-overlay" id="overlay" aria-hidden="true">
      <div class="beam" id="beam"></div>

      <div class="curtain" id="curtain" aria-hidden="true">
        <div class="panel left"></div><div class="panel right"></div>
      </div>

      <div class="spotlight" id="spotlight" role="dialog" aria-modal="true" aria-labelledby="resultName" aria-describedby="resultDesc">
        <div class="reveal-card" id="revealCard">
          <div class="reveal-emoji" id="resultEmoji">🐱</div>
          <div class="reveal-title" id="resultName">Your Perfect Cat Is...</div>
          <div class="reveal-desc" id="resultDesc">A loving companion to match your vibe.</div>

          <div class="result-meta" id="meta"></div>

          <div style="margin-top:16px;display:flex;gap:10px;justify-content:center">
            <button class="btn" id="accept">Yes — Bring them home!</button>
            <button class="btn ghost" id="tryAgain">Try Again</button>
          </div>
        </div>
      </div>

      <div class="confetti" id="confetti"></div>
    </div>
  </div>

<script>
(function(){
  // Types and questions (same 3 questions)
  const types = [
    { id:'ragdoll', name:'Ragdoll', emoji:'😺', desc:'Gentle, cuddly, loves to be held. Good for calm homes.' },
    { id:'mainecoon', name:'Maine Coon', emoji:'🐯', desc:'Large, sociable, playful — great with families.' },
    { id:'siamese', name:'Siamese', emoji:'🗣️', desc:'Vocal, intelligent, needs interaction and attention.' },
    { id:'bengal', name:'Bengal', emoji:'🐆', desc:'Energetic and curious — ideal for active owners.' },
    { id:'sphynx', name:'Sphynx', emoji:'🧣', desc:'Affectionate, low-shedding, needs warmth and care.' },
    { id:'persian', name:'Persian', emoji:'🛋️', desc:'Calm, regal, enjoys quiet and grooming.' },
    { id:'domestic', name:'Domestic Shorthair', emoji:'🐾', desc:'Adaptable, low-maintenance, good all-rounder.' }
  ];

  const questions = [
    {
      q:"How active is your lifestyle?",
      hint:"Choose the one that fits you best.",
      options:[
        {title:"Laid-back & quiet", desc:"Prefer relaxation over frequent play", score:{persian:2, ragdoll:2, domestic:1}},
        {title:"Moderately active", desc:"Enjoy playtime a few times a day", score:{mainecoon:2, domestic:2, siamese:1}},
        {title:"Very active & playful", desc:"Love high-energy activities and play", score:{bengal:3, mainecoon:1, siamese:2}}
      ]
    },
    {
      q:"Who shares your home?",
      hint:"This helps find a cat suited to your household.",
      options:[
        {title:"Quiet, no kids/pets", desc:"Peaceful environment", score:{persian:2, ragdoll:2, sphynx:1}},
        {title:"Kids or other pets", desc:"Busy household with noises", score:{mainecoon:3, ragdoll:2, domestic:2}},
        {title:"Lots of visitors", desc:"Social scene - cat needs to be tolerant", score:{mainecoon:2, siamese:1, domestic:2}}
      ]
    },
    {
      q:"How do you feel about grooming and allergies?",
      hint:"Consider shedding, grooming time, and allergies.",
      options:[
        {title:"I prefer low-shedding", desc:"Minimise fur around the house", score:{sphynx:3, domestic:1}},
        {title:"Happy to groom regularly", desc:"I don't mind brushing and care", score:{persian:3, ragdoll:1}},
        {title:"Low-maintenance preferred", desc:"Minimal grooming and fuss", score:{domestic:3, bengal:1}}
      ]
    }
  ];

  // Elements
  const qTitle = document.getElementById('qTitle');
  const qHint = document.getElementById('qHint');
  const optionsWrap = document.getElementById('options');
  const progress = document.getElementById('progress');
  const revealEarlyBtn = document.getElementById('revealEarly');
  const restartBtn = document.getElementById('restart');

  const overlay = document.getElementById('overlay');
  const curtain = document.getElementById('curtain');
  const spotlight = document.getElementById('spotlight');
  const beam = document.getElementById('beam');
  const resultEmoji = document.getElementById('resultEmoji');
  const resultName = document.getElementById('resultName');
  const resultDesc = document.getElementById('resultDesc');
  const meta = document.getElementById('meta');
  const confetti = document.getElementById('confetti');
  const acceptBtn = document.getElementById('accept');
  const tryAgainBtn = document.getElementById('tryAgain');

  // State
  let idx = 0;
  let scores = {};
  let answered = 0;

  function initScores(){
    scores = {};
    types.forEach(t=>scores[t.id]=0);
    answered = 0;
  }

  function renderProgress(){
    progress.innerHTML = '';
    for(let i=0;i<questions.length;i++){
      const dot = document.createElement('div');
      dot.className = 'dot' + (i===idx ? ' active' : '');
      progress.appendChild(dot);
    }
  }

  function renderQuestion(){
    const q = questions[idx];
    qTitle.textContent = `Question ${idx+1}: ${q.q}`;
    qHint.textContent = q.hint;
    optionsWrap.innerHTML = '';
    q.options.forEach((opt, i)=>{
      const b = document.createElement('button');
      b.className = 'option';
      b.type = 'button';
      b.setAttribute('aria-label', opt.title + ' — ' + opt.desc);
      b.innerHTML = '<div class="emoji">🐈</div><div style="flex:1"><div class="title">'+escapeHtml(opt.title)+'</div><div class="desc">'+escapeHtml(opt.desc)+'</div></div>';
      // click
      b.addEventListener('click', ()=> chooseOption(opt));
      // keyboard: Enter/Space handled naturally for button
      optionsWrap.appendChild(b);
    });
    renderProgress();
  }

  function chooseOption(opt){
    answered++;
    if(opt.score){
      for(const k in opt.score){
        if(typeof scores[k] === 'number') scores[k] += opt.score[k];
      }
    }
    idx++;
    if(idx < questions.length){
      // simple fade transition
      fadeOutIn(renderQuestion);
    } else {
      doReveal();
    }
  }

  function fadeOutIn(next){
    optionsWrap.style.opacity = '0';
    qTitle.style.opacity = '0';
    qHint.style.opacity = '0';
    setTimeout(()=>{
      next();
      optionsWrap.style.opacity = '1';
      qTitle.style.opacity = '1';
      qHint.style.opacity = '1';
    }, 220);
  }

  function doReveal(){
    restartBtn.style.display = 'inline-block';
    computeResult();
    // show overlay and animate
    overlay.classList.add('active');
    overlay.setAttribute('aria-hidden','false');
    // reset curtain & spotlight states
    curtain.classList.remove('open');
    spotlight.classList.remove('on');
    beam.classList.remove('on');
    confetti.innerHTML = '';
    // small delay, then open curtains
    setTimeout(()=>{
      curtain.classList.add('open');
      beam.classList.add('on');
      playDrumroll();
      setTimeout(()=> spotlight.classList.add('on'), 600);
      setTimeout(()=> {
        // show reveal card details
        const emojiEl = resultEmoji;
        emojiEl.classList.add('show');
        document.querySelector('.reveal-title').classList.add('show');
        document.querySelector('.reveal-desc').classList.add('show');
        spawnConfetti();
      }, 1200);
    }, 120);
    // ensure overlay covers content visually (but not intercept initial clicks while hidden)
  }

  function computeResult(){
    let max=-Infinity, winners=[];
    for(const t of types){
      const s = scores[t.id] || 0;
      if(s > max){ max = s; winners = [t]; }
      else if(s === max){ winners.push(t); }
    }
    let pick;
    if(answered === 0) pick = types.find(t=>t.id==='domestic') || types[0];
    else pick = winners[Math.floor(Math.random()*winners.length)];
    showResult(pick);
  }

  function showResult(t){
    resultEmoji.textContent = t.emoji || '🐱';
    resultName.textContent = t.name;
    resultDesc.textContent = t.desc;
    meta.innerHTML = '';
    deriveMeta(t.id).forEach(m=>{
      const d = document.createElement('div'); d.className='pill'; d.textContent = m;
      meta.appendChild(d);
    });
  }

  function deriveMeta(id){
    const map = {
      ragdoll:['Affectionate','Moderate energy','Good with families'],
      mainecoon:['Big & playful','Sociable','Hardy groom'],
      siamese:['Vocal & smart','Needs attention','High interaction'],
      bengal:['Very active','Curious & playful','High stimulation'],
      sphynx:['Low-shed','Needs warmth','Very social'],
      persian:['Calm & regal','High grooming','Low energy'],
      domestic:['Adaptable','Low-maintenance','Good beginner pet']
    };
    return map[id] || ['Balanced temperament','Moderate needs'];
  }

  function spawnConfetti(){
    confetti.innerHTML = '';
    const count = 28;
    const palette = ['#ffcc00','#ff6b6b','#7afcff','#7b61ff','#ffd2a6','#7de38b'];
    for(let i=0;i<count;i++){
      const el = document.createElement('div');
      const w = 6 + Math.round(Math.random()*12);
      el.style.position='absolute';
      el.style.left = Math.random()*100 + '%';
      el.style.top = (Math.random()*20 - 10) + '%';
      el.style.width = w + 'px';
      el.style.height = (w*0.6) + 'px';
      el.style.background = palette[Math.floor(Math.random()*palette.length)];
      el.style.opacity = 0.85;
      el.style.transform = 'rotate('+ (Math.random()*360) +'deg)';
      el.style.borderRadius = '2px';
      el.style.pointerEvents = 'none';
      el.style.transition = 'transform 3.6s linear, top 3.6s linear, opacity 3.6s';
      confetti.appendChild(el);
      // animate after appending
      setTimeout(()=> {
        el.style.top = (80 + Math.random()*20) + 'vh';
        el.style.transform = 'rotate('+ (Math.random()*720) +'deg) translateY(20vh)';
        el.style.opacity = 0.95;
      }, 40 + Math.random()*400);
      // remove later
      setTimeout(()=> el.remove(), 5600);
    }
  }

  function playDrumroll(){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;
      const master = ctx.createGain(); master.connect(ctx.destination); master.gain.value = 0.7;
      const hits = 10;
      for(let i=0;i<hits;i++){
        const t = now + i*0.06 + i*0.001;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'triangle';
        o.frequency.value = 70 + i*6;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.06, t+0.01);
        g.gain.exponentialRampToValueAtTime(0.001, t+0.18);
        o.connect(g); g.connect(master);
        o.start(t); o.stop(t+0.24);
      }
      setTimeout(()=>{
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type='sine'; o.frequency.value=520;
        g.gain.value=0.001;
        o.connect(g); g.connect(master);
        g.gain.linearRampToValueAtTime(0.06, ctx.currentTime+0.02);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.9);
        o.start(); setTimeout(()=>o.stop(),900);
      }, 1000);
    }catch(e){ /* ignore audio errors */ }
  }

  // Utility
  function escapeHtml(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Controls
  document.getElementById('revealEarly').addEventListener('click', ()=>{
    doReveal();
  });

  restartBtn.addEventListener('click', ()=>{
    reset();
    start();
  });

  tryAgainBtn.addEventListener('click', ()=>{
    reset();
    start();
  });

  acceptBtn.addEventListener('click', ()=>{
    alert('Great! Consider adopting from a local shelter or rescue — many lovely cats are waiting for homes.');
  });

  // Start/reset
  function reset(){
    idx = 0;
    initScores();
    overlay.classList.remove('active');
    overlay.setAttribute('aria-hidden','true');
    curtain.classList.remove('open');
    spotlight.classList.remove('on');
    beam.classList.remove('on');
    confetti.innerHTML='';
    document.querySelector('.reveal-emoji').classList.remove('show');
    document.querySelector('.reveal-title').classList.remove('show');
    document.querySelector('.reveal-desc').classList.remove('show');
    restartBtn.style.display = 'none';
  }

  function start(){
    initScores();
    renderQuestion();
  }

  // init
  reset();
  start();

  // Accessibility: allow keyboard navigation via Tab; buttons are native interactive elements
})();
</script>
</body>
</html>
